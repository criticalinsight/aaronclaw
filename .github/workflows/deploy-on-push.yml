name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  AARONCLAW_D1_DATABASE_ID: ${{ secrets.AARONCLAW_D1_DATABASE_ID }}
  AARONCLAW_D1_DATABASE_NAME: ${{ vars.AARONCLAW_D1_DATABASE_NAME }}
  AARONCLAW_DEPLOY_WITH_VECTORIZE: ${{ vars.AARONCLAW_DEPLOY_WITH_VECTORIZE }}

jobs:
  validate:
    name: Validate deploy inputs and dry run
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check required deploy secrets
        shell: bash
        run: |
          missing=0
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID AARONCLAW_D1_DATABASE_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub environment secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate checked-in Wrangler config
        run: bun run validate:config

      - name: Typecheck application code
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Dry-run deploy with generated config
        run: bun run deploy:dry-run

  deploy:
    name: Apply migrations and deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    needs: validate
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check required deploy secrets
        shell: bash
        run: |
          missing=0
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID AARONCLAW_D1_DATABASE_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub environment secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Render deploy config
        run: bun run deploy:prep

      - name: Apply remote D1 migrations
        shell: bash
        run: bun x wrangler d1 migrations apply "${AARONCLAW_D1_DATABASE_NAME:-aaronclaw-aarondb}" --remote --config .wrangler/deploy/wrangler.jsonc

      - name: Deploy Worker
        run: bun run deploy